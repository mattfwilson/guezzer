<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Gizz With Friends — multi-user spike</title>
    <style>
      :root {
        --surface: #0c0c10;
        --elevated: #16161d;
        --hairline: #26262f;
        --text: #ececf1;
        --muted: #9a9aa8;
        --gold: #e8b84b;
        --green: #4bd66f;
        --accent: #7c6cff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 15px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--surface);
        color: var(--text);
        -webkit-tap-highlight-color: transparent;
        padding: max(env(safe-area-inset-top), 16px) 16px 32px;
      }
      h1 { font-size: 20px; margin: 0 0 2px; }
      .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
      .card {
        background: var(--elevated);
        border: 1px solid var(--hairline);
        border-radius: 14px;
        padding: 16px;
        margin: 0 auto 16px;
        max-width: 460px;
      }
      label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
      input, button, select {
        font: inherit;
        border-radius: 10px;
        border: 1px solid var(--hairline);
        background: #101017;
        color: var(--text);
        padding: 12px;
        width: 100%;
      }
      button {
        cursor: pointer;
        background: var(--accent);
        border: none;
        font-weight: 600;
        min-height: 48px;
      }
      button.ghost { background: #1d1d27; color: var(--text); }
      button.gold { background: var(--gold); color: #1a1400; }
      button:active { transform: translateY(1px); }
      .row { display: flex; gap: 8px; align-items: center; }
      .quick { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
      .quick button { width: auto; flex: 1 1 auto; min-height: 38px; padding: 8px 10px; font-size: 13px; background: #1d1d27; }
      .hidden { display: none; }
      .who { display: flex; align-items: center; justify-content: space-between; padding: 10px 4px; border-bottom: 1px solid var(--hairline); }
      .who:last-child { border-bottom: none; }
      .who .name { display: flex; align-items: center; gap: 8px; }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: #3a3a46; flex: none; }
      .dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
      .count { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--gold); }
      .me { color: var(--accent); font-weight: 700; }
      .wave { width: auto; min-height: 34px; padding: 6px 10px; font-size: 13px; background: #1d1d27; }
      .bignum { font-size: 40px; font-weight: 800; color: var(--gold); font-variant-numeric: tabular-nums; text-align: center; margin: 4px 0 12px; }
      .status { font-size: 12px; color: var(--muted); text-align: center; margin-top: 6px; min-height: 16px; }
      .err { color: #ff7a7a; }
      #toasts { position: fixed; left: 0; right: 0; bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
      .toast { background: var(--accent); color: #fff; padding: 10px 16px; border-radius: 999px; font-weight: 600; box-shadow: 0 6px 24px rgba(0,0,0,.5); animation: pop .3s ease; }
      @keyframes pop { from { transform: scale(.8); opacity: 0; } }
      .net { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
      .net.online { background: rgba(75,214,111,.15); color: var(--green); }
      .net.offline { background: rgba(255,122,122,.15); color: #ff7a7a; }
    </style>
  </head>
  <body>
    <h1>Gizz With Friends</h1>
    <p class="sub">multi-user foundation spike · <span id="net" class="net offline">connecting…</span></p>

    <!-- Setup error (missing config.local.js) -->
    <div id="setup" class="card hidden">
      <strong>Almost there.</strong>
      <p class="sub" style="margin-top:8px">
        Copy <code>config.example.js</code> → <code>config.local.js</code> in this folder and
        paste your Supabase <b>Project URL</b> + <b>anon key</b>, then reload.
      </p>
    </div>

    <!-- Login -->
    <div id="login" class="card hidden">
      <label>Email</label>
      <input id="email" type="email" autocomplete="username" placeholder="matt@fov.gizz" />
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="your password" />
      <div style="height:12px"></div>
      <button id="loginBtn">Log in</button>
      <div class="quick" id="quickPick"></div>
      <div class="status" id="loginStatus"></div>
    </div>

    <!-- App (post-login) -->
    <div id="app" class="hidden">
      <div class="card">
        <div class="row" style="justify-content:space-between">
          <div>Signed in as <span class="me" id="meName">—</span></div>
          <button class="ghost" id="logoutBtn" style="width:auto;min-height:36px;padding:8px 14px">Log out</button>
        </div>
      </div>

      <div class="card">
        <label style="margin-top:0">Your catch (this show)</label>
        <div class="bignum" id="myCount">0</div>
        <button class="gold" id="catchBtn">🎵 +1 caught</button>
      </div>

      <div class="card">
        <label style="margin-top:0">Friends — progress & who's online</label>
        <div id="friends"></div>
      </div>
    </div>

    <div id="toasts"></div>

    <script src="./supabase.umd.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
